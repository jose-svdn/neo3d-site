<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="NEO3D — Entre em contato conosco para iniciar seu projeto de impressão 3D personalizado.">
    <title>NEO3D | Contato</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="page-dark">

    <!-- ─── Header (Dark) ─── -->
    <header class="header header--dark" id="header">
        <a href="index.html" class="header__logo">
            <img src="assets/images/logo_branca.png" alt="" class="logo-img">
        </a>

        <nav class="header__nav" id="desktopNav">
            <a href="index.html">HOME</a>
            <a href="projetos.html">PROJETOS</a>
            <a href="sobre.html">SOBRE</a>
            <a href="contato.html" class="active">CONTATO</a>
        </nav>

        <div class="header__right">
            <button class="header__cta" onclick="window.location.href='contato.html'">CRIE COM A GENTE</button>
            <div class="header__hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <!-- ─── Mobile Menu Overlay ─── -->
    <div class="menu-overlay" id="menuOverlay">
        <a href="index.html">Home</a>
        <a href="projetos.html">Projetos</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
    </div>

    <!-- ─── Contact Content ─── -->
    <main class="contact-page">
        <div class="reveal">
            <h1>Fale<br>conosco</h1>
            <p class="subtitle" style="margin-bottom: 12px;">
                Tem um projeto em mente? Entre em contato via WhatsApp
            </p>

            <a href="https://wa.me/554195066428" target="_blank" class="whatsapp-btn-large"
                aria-label="Fale pelo WhatsApp">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path
                        d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z" />
                </svg>
            </a>

            <p class="subtitle" style="margin-bottom: 40px;">
                Ou preencha o formulário abaixo. Cada peça começa com uma conversa.
            </p>
        </div>

        <form class="reveal" id="contactForm" onsubmit="return false;">
            <div class="form-group">
                <label for="name">QUAL É O SEU NOME?</label>
                <input type="text" id="name" placeholder="Seu nome completo" required>
            </div>

            <div class="form-group">
                <label for="email">QUAL É O SEU E-MAIL?</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="message">DESCREVA SEU PROJETO EM ALGUMAS LINHAS</label>
                <textarea id="message"
                    placeholder="Conte-nos sobre sua ideia, dimensões desejadas, material preferido..."
                    required></textarea>
            </div>

            <button type="submit" class="form-submit">ENVIAR MENSAGEM</button>
        </form>
    </main>

    <!-- ─── Footer Framing ─── -->
    <div class="footer-frame">
        <span class="footer-frame__text footer-frame__text--dark">NEO</span>
        <span class="footer-frame__text footer-frame__text--dark">3D</span>
    </div>

    <!-- ─── Footer ─── -->
    <footer class="footer">
        © NEO3D 2026. Todos os direitos reservados.
    </footer>

    <script src="script.js"></script>
</body>

</html>
